<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boxys · Campanhas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
/* Quill overrides */
.ql-toolbar { border-radius: 8px 8px 0 0 !important; border-color: var(--line) !important; background: var(--canvas); }
.ql-container { border-radius: 0 0 8px 8px !important; border-color: var(--line) !important; font-family: var(--ui); font-size: 13px; }
.ql-editor { min-height: 160px; }
:root {
  --canvas: #EEF0F4;
  --surface: #FFFFFF;
  --ink: #1B1E2E;
  --ink-soft: #2A2E44;
  --accent: #0FA47F;
  --accent-deep: #0B7D60;
  --accent-bg: #E8F5F0;
  --amber: #E8A13A;
  --red: #D9544D;
  --line: #DCE0E8;
  --muted: #6B7185;
  --mono: 'JetBrains Mono', monospace;
  --ui: 'Space Grotesk', system-ui, sans-serif;
  --sidebar-w: 210px;
  --topbar-h: 52px;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(27,30,46,.08), 0 0 0 1px var(--line);
}
*, *::before, *::after { margin: 0; box-sizing: border-box; }
body { font-family: var(--ui); background: var(--canvas); color: var(--ink);
  -webkit-font-smoothing: antialiased; line-height: 1.45; }

/* ---- Shell ---- */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--ink); display: flex; align-items: center; gap: 16px;
  padding: 0 20px; z-index: 100; border-bottom: 1px solid #2E3450;
}
.brand { display: flex; align-items: baseline; gap: 9px; flex: none; }
.brand b { font-weight: 700; font-size: 18px; color: #fff; letter-spacing: -.01em; }
.brand span { font-size: 11px; color: #7A809B; font-family: var(--mono); }
#topbar-search {
  flex: 1; max-width: 360px; background: #23273D; border: 1px solid #343A57;
  border-radius: 8px; padding: 7px 12px; font-family: var(--mono); font-size: 13px;
  color: #E8EAF2; outline: none; transition: border-color .15s;
}
#topbar-search::placeholder { color: #5A607B; }
#topbar-search:focus { border-color: var(--accent); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.status-chip {
  display: flex; align-items: center; gap: 7px; font-size: 11px;
  font-family: var(--mono); color: #9AA0BC; padding: 6px 10px; border-radius: 7px;
  background: #1F2336; border: 1px solid #2E3450; white-space: nowrap;
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.dot.on { background: var(--accent); box-shadow: 0 0 0 3px rgba(15,164,127,.2); }
.dot.off { background: var(--amber); }
.btn-primary {
  background: var(--accent); color: #062018; border: none; font-family: var(--ui);
  font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 8px;
  cursor: pointer; white-space: nowrap; transition: background .15s;
}
.btn-primary:hover { background: #12B88E; }
.btn-ghost {
  background: transparent; color: var(--accent); border: 1.5px solid var(--accent);
  font-family: var(--ui); font-weight: 600; font-size: 12px; padding: 6px 12px;
  border-radius: 7px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.btn-ghost:hover { background: var(--accent); color: #062018; }

#layout { display: flex; padding-top: var(--topbar-h); min-height: 100vh; }

#sidebar {
  width: var(--sidebar-w); flex: none; background: var(--surface);
  border-right: 1px solid var(--line); position: fixed; top: var(--topbar-h);
  bottom: 0; overflow-y: auto; padding: 16px 0;
}
.sidebar-section { padding: 0 14px; margin-bottom: 8px; }
.sidebar-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); font-weight: 600; padding: 4px 8px 8px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--ink-soft); transition: all .12s; text-decoration: none;
  overflow: hidden;
}
.sidebar-item:hover { background: var(--canvas); }
.sidebar-item.active { background: var(--accent-bg); color: var(--accent-deep); }
.sidebar-item .si-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-item .si-count {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  background: var(--canvas); padding: 2px 6px; border-radius: 10px; flex: none;
}
.sidebar-item.active .si-count { background: rgba(15,164,127,.15); color: var(--accent-deep); }
.sidebar-divider { height: 1px; background: var(--line); margin: 8px 14px; }

#main {
  flex: 1; margin-left: var(--sidebar-w); min-width: 0; padding: 32px 36px 60px;
}

/* ---- Grid ---- */
.view-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.view-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.view-header .count { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: 10px; }
.header-actions { display: flex; gap: 10px; }

.breadcrumb {
  display: flex; align-items: center; gap: 6px; font-size: 13px;
  color: var(--muted); margin-bottom: 20px;
}
.breadcrumb a { color: var(--accent-deep); text-decoration: none; font-weight: 500; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--line); font-size: 16px; }

.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}

/* ---- Item cards ---- */
.item-card {
  background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
  cursor: pointer; transition: box-shadow .15s, transform .1s;
  position: relative; overflow: visible;
}
.item-card:hover { box-shadow: 0 6px 20px rgba(27,30,46,.13), 0 0 0 1px var(--accent); transform: translateY(-2px); }

.item-preview {
  border-radius: var(--radius) var(--radius) 0 0; overflow: hidden;
  aspect-ratio: 1 / 0.85; background: var(--canvas); display: flex;
  align-items: center; justify-content: center; position: relative;
}
.item-preview img { width: 100%; height: 100%; object-fit: cover; }
.item-label {
  padding: 9px 11px 10px; border-top: 1px solid var(--line);
}
.item-name {
  font-size: 12px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-meta {
  font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 2px;
}
.item-menu {
  position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,.92);
  border: 1px solid var(--line); border-radius: 6px; width: 24px; height: 24px;
  display: none; align-items: center; justify-content: center; cursor: pointer;
  font-size: 14px; color: var(--muted); transition: all .12s; z-index: 2;
  backdrop-filter: blur(4px);
}
.item-card:hover .item-menu { display: flex; }
.item-menu:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

/* Folder icon */
.folder-preview { background: var(--accent-bg); }
.folder-svg { width: 56px; height: 56px; }
.folder-thumbs {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 3px;
}
.folder-thumb {
  width: 32px; height: 22px; border-radius: 3px; object-fit: cover;
  border: 1.5px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.15);
}
.folder-thumb-ph {
  width: 32px; height: 22px; border-radius: 3px; background: var(--accent);
  opacity: .35;
}

/* HTML file preview */
.html-preview-bg {
  width: 100%; height: 100%; display: flex; align-items: center;
  justify-content: center; flex-direction: column; gap: 4px;
  background: linear-gradient(135deg, #1B1E2E 0%, #0FA47F 100%);
}
.html-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,.7); background: rgba(0,0,0,.3); padding: 3px 7px;
  border-radius: 5px;
}
.html-size { font-size: 11px; color: rgba(255,255,255,.5); font-family: var(--mono); }

/* Image/video placeholders */
.media-icon { font-size: 32px; opacity: .4; }

/* ---- Campaign name editable ---- */
.campaign-title-wrap { display: flex; align-items: center; gap: 10px; }
.campaign-title {
  font-size: 22px; font-weight: 700; letter-spacing: -.02em;
  border: 2px solid transparent; border-radius: 7px; padding: 2px 6px;
  outline: none; background: transparent; color: var(--ink); cursor: text;
  transition: border-color .15s;
}
.campaign-title:focus { border-color: var(--accent); background: var(--surface); }

/* ---- Figma panel ---- */
#figma-panel {
  background: var(--ink); border-radius: 14px; margin-bottom: 24px; overflow: hidden;
  transition: all .2s;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; cursor: pointer;
}
.panel-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
.panel-toggle {
  background: transparent; border: none; color: #9AA0BC; cursor: pointer;
  font-size: 18px; line-height: 1; transition: transform .2s;
}
.panel-toggle.open { transform: rotate(180deg); }
.panel-body { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 16px; }

.panel-field { display: flex; flex-direction: column; gap: 6px; }
.panel-field label { font-size: 10px; text-transform: uppercase; letter-spacing: .09em; color: #9AA0BC; font-weight: 600; }
.panel-input {
  font-family: var(--mono); font-size: 13px; color: #F4F5FB; background: #23273D;
  border: 1px solid #343A57; border-radius: 8px; padding: 9px 12px; outline: none;
  transition: border-color .15s; width: 100%;
}
.panel-input:focus { border-color: var(--accent); }
.panel-row { display: flex; gap: 12px; }
.panel-row > * { flex: 1; }

.panel-browse-btn {
  font-family: var(--ui); font-size: 12px; font-weight: 600; color: var(--accent);
  background: transparent; border: 1px solid var(--accent); border-radius: 7px;
  padding: 6px 12px; cursor: pointer; transition: all .15s; align-self: flex-start;
}
.panel-browse-btn:hover { background: var(--accent); color: #062018; }
.panel-browse-btn:disabled { opacity: .4; cursor: not-allowed; }

.frame-picker { display: flex; flex-direction: column; gap: 10px; }
.picker-head { display: flex; align-items: center; justify-content: space-between; }
.picker-head span { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: #9AA0BC; font-weight: 600; }
.picker-head button { font-size: 11px; color: #9AA0BC; background: transparent; border: none; cursor: pointer; text-decoration: underline; }
.frame-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 360px; overflow-y: auto; padding-right: 2px; }
.frame-card { border: 2px solid #343A57; border-radius: 8px; overflow: hidden; cursor: pointer; background: #1A1E33; transition: border-color .15s; position: relative; }
.frame-card.selected { border-color: var(--accent); background: #0d2620; }
.frame-card .thumb-wrap { width: 100%; overflow: hidden; background: #23273D; }
.frame-card .thumb { width: 100%; height: auto; display: block; }
.frame-card .thumb-placeholder { display: flex; align-items: center; justify-content: center; color: #4A5070; font-size: 11px; padding: 20px 0; }
.frame-card .finfo { padding: 6px 8px; }
.frame-card .fname { font-size: 11px; font-weight: 600; color: #E8EAF2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.frame-card .fmeta { font-size: 10px; color: #6B7185; font-family: var(--mono); margin-top: 1px; }
.frame-card .fcheck { position: absolute; top: 5px; right: 5px; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); display: none; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; }
.frame-card.selected .fcheck { display: flex; }
.picker-loading { text-align: center; color: #9AA0BC; font-size: 13px; padding: 18px 0; width: 100%; }

.panel-run {
  background: var(--accent); color: #062018; border: none; font-family: var(--ui);
  font-weight: 700; font-size: 14px; padding: 12px; border-radius: 9px;
  cursor: pointer; transition: background .15s;
}
.panel-run:hover { background: #12B88E; }
.panel-run:disabled { background: #39405C; color: #7A809B; cursor: not-allowed; }

/* pipeline tracker */
.pipe { display: flex; align-items: center; padding: 14px 20px; background: #FAFBFC; }
.step { display: flex; align-items: center; gap: 7px; flex: none; }
.step .mark { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--line); display: grid; place-items: center; font-size: 10px; font-weight: 700; color: var(--muted); background: var(--surface); transition: all .25s; }
.step .name { font-size: 11px; color: var(--muted); font-weight: 500; transition: color .25s; white-space: nowrap; }
.step.done .mark { border-color: var(--accent); background: var(--accent); color: #fff; }
.step.done .name { color: var(--ink); }
.step.active .mark { border-color: var(--amber); color: var(--amber); animation: pulse 1s infinite; }
.step.active .name { color: var(--ink-soft); }
.step.err .mark { border-color: var(--red); background: var(--red); color: #fff; }
.step.err .name { color: var(--red); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,161,58,.4)}50%{box-shadow:0 0 0 5px rgba(232,161,58,0)} }
.link { flex: 1; height: 2px; background: var(--line); margin: 0 8px; border-radius: 2px; transition: background .25s; min-width: 8px; }
.link.done { background: var(--accent); }

.conv-card { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
.conv-top { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
.conv-top .id { font-weight: 600; font-size: 14px; }
.conv-top .fmt { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--canvas); padding: 2px 7px; border-radius: 5px; }
.conv-top .nid { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-left: auto; }
.err-box { margin: 12px 16px; padding: 12px 14px; background: #FCEEED; border: 1px solid #F3C9C5; border-radius: 8px; color: #8E2F29; font-size: 13px; }
.warn-notice { margin: 0 16px 0; padding: 9px 14px; font-size: 12px; background: #FFF7E8; border-top: 1px solid #F0DBB0; color: #8A6516; }
.conv-success { padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--accent-deep); }
.conv-preview-url { font-family: var(--mono); font-size: 11px; }
.conv-results-area { margin-top: 12px; }

/* ---- Empty state ---- */
.empty-state {
  border: 2px dashed var(--line); border-radius: 16px; padding: 54px 30px;
  text-align: center; color: var(--muted); background: var(--surface);
  grid-column: 1 / -1;
}
.empty-state b { display: block; color: var(--ink); font-size: 16px; margin-bottom: 6px; font-weight: 600; }
.empty-state span { font-size: 13px; }

/* ---- Modals ---- */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(27,30,46,.55);
  display: none; align-items: center; justify-content: center;
  z-index: 200; padding: 20px; backdrop-filter: blur(2px);
}
#modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 16px; box-shadow: 0 24px 64px rgba(27,30,46,.25);
  width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column;
}
.modal-sm { max-width: 420px; }
.modal-md { max-width: 560px; }
.modal-lg { max-width: 760px; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 17px; font-weight: 700; }
.modal-close { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 22px; line-height: 1; transition: color .12s; }
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 20px 24px; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }

.form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-field:last-child { margin-bottom: 0; }
.form-field label { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); font-weight: 600; }
.form-input {
  font-family: var(--ui); font-size: 13px; color: var(--ink); background: var(--canvas);
  border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 12px; outline: none;
  transition: border-color .15s; width: 100%;
}
.form-input:focus { border-color: var(--accent); background: #fff; }
textarea.form-input { resize: vertical; min-height: 72px; line-height: 1.5; }

/* seg control */
.seg { display: flex; background: var(--canvas); border: 1px solid var(--line); border-radius: 9px; padding: 3px; gap: 3px; }
.seg button { flex: 1; font-family: var(--ui); font-size: 13px; font-weight: 500; color: var(--muted); background: transparent; border: none; border-radius: 7px; padding: 8px; cursor: pointer; transition: all .15s; }
.seg button.on { background: var(--accent); color: #062018; font-weight: 700; }

/* ZIP modal */
.zip-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: 8px; margin-top: 12px; max-height: 220px; overflow-y: auto; }
.zip-item { border: 2px solid var(--line); border-radius: 8px; cursor: pointer; overflow: hidden; transition: border-color .15s; }
.zip-item.selected { border-color: var(--accent); }
.zip-item-preview { aspect-ratio: 1; background: var(--canvas); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.zip-item-preview img { width: 100%; height: 100%; object-fit: cover; }
.zip-item-name { padding: 4px 6px; font-size: 10px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.zip-order-list { margin-top: 12px; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; }
.zip-order-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  background: var(--surface); border-bottom: 1px solid var(--line); cursor: grab;
  transition: background .12s;
}
.zip-order-item:last-child { border-bottom: none; }
.zip-order-item.dragging { opacity: .4; }
.zip-order-item.drag-over { background: var(--accent-bg); }
.drag-handle { color: var(--muted); font-size: 16px; cursor: grab; flex: none; }
.zip-order-thumb { width: 36px; height: 26px; border-radius: 4px; object-fit: cover; background: var(--canvas); flex: none; }
.zip-order-name { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.zip-remove { background: transparent; border: none; cursor: pointer; color: var(--muted); font-size: 16px; transition: color .12s; }
.zip-remove:hover { color: var(--red); }

/* Carousel modal */
.carousel-items-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.carousel-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--canvas); border-radius: 8px; }
.carousel-list-thumb { width: 40px; height: 28px; border-radius: 4px; object-fit: cover; background: var(--line); flex: none; }
.carousel-list-name { flex: 1; font-size: 13px; font-weight: 500; }

/* Preview modal */
.preview-modal-wrap { display: flex; align-items: center; justify-content: center; min-height: 200px; padding: 10px 0; }
.preview-stage-wrap .stage { position: relative; transform-origin: top left; }
.preview-stage-wrap .lyr { position: absolute; overflow: hidden; }
.preview-stage-wrap .lyr.txt[contenteditable="true"] { outline: 1px dashed rgba(15,164,127,.6); outline-offset: 1px; cursor: text; border-radius: 2px; }

/* Context menu */
.ctx-menu {
  position: fixed; background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; box-shadow: 0 8px 24px rgba(27,30,46,.18); z-index: 300;
  min-width: 160px; overflow: hidden;
}
.ctx-item { padding: 9px 16px; font-size: 13px; cursor: pointer; transition: background .1s; color: var(--ink); }
.ctx-item:hover { background: var(--canvas); }
.ctx-item.danger { color: var(--red); }
.ctx-item.danger:hover { background: #FCEEED; }

/* Draft badge */
.draft-badge {
  position: absolute; top: 6px; left: 6px; background: rgba(232,161,58,.92);
  color: #7a4800; font-size: 9px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 2px 6px; border-radius: 4px;
  font-family: var(--mono); backdrop-filter: blur(2px); z-index: 1;
}
.published-badge {
  position: absolute; top: 6px; left: 6px; background: rgba(15,164,127,.85);
  color: #fff; font-size: 9px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 2px 6px; border-radius: 4px;
  font-family: var(--mono); backdrop-filter: blur(2px); z-index: 1;
}

/* Metatags form inside conversion card */
.meta-form {
  padding: 14px 16px; border-top: 1px solid var(--line); background: #FAFBFC;
  display: flex; flex-direction: column; gap: 10px;
}
.meta-form-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); font-weight: 600; margin-bottom: -4px;
}
.meta-form input, .meta-form textarea {
  font-family: var(--ui); font-size: 13px; color: var(--ink); background: #fff;
  border: 1.5px solid var(--line); border-radius: 7px; padding: 7px 10px;
  width: 100%; outline: none; transition: border-color .15s;
}
.meta-form input:focus, .meta-form textarea:focus { border-color: var(--accent); }
.meta-form textarea { resize: vertical; min-height: 52px; line-height: 1.5; }
.publish-btn {
  background: var(--accent); color: #062018; border: none; font-family: var(--ui);
  font-weight: 700; font-size: 13px; padding: 10px 16px; border-radius: 8px;
  cursor: pointer; transition: background .15s; align-self: flex-start;
}
.publish-btn:hover { background: #12B88E; }
.publish-btn:disabled { background: #39405C; color: #7A809B; cursor: not-allowed; }
.published-bar {
  padding: 10px 16px; background: #E8F5F0; border-top: 1px solid #A3D9C9;
  font-size: 13px; color: var(--accent-deep); font-weight: 500;
  display: flex; align-items: center; gap: 10px;
}

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--line); border-radius: 10px; padding: 24px;
  text-align: center; cursor: pointer; transition: all .15s; color: var(--muted);
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-deep); }
.upload-zone input { display: none; }

/* Copy cards */
.copies-section { margin-bottom: 28px; }
.copies-section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.copies-section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); font-weight: 600;
}
.copies-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.copy-card {
  background: var(--surface); border: 1.5px solid var(--line); border-radius: 10px;
  padding: 12px 14px; min-width: 200px; max-width: 260px; flex: none; cursor: pointer;
  transition: border-color .15s, box-shadow .15s; position: relative;
}
.copy-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(15,164,127,.1); }
.copy-card.pending { border-color: var(--accent); background: var(--accent-bg); }
.copy-card-name { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.copy-card-field { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.copy-card-count { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 6px; }
.copy-card-menu {
  position: absolute; top: 8px; right: 8px; background: transparent; border: none;
  cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px 6px;
  border-radius: 4px; transition: all .12s;
}
.copy-card-menu:hover { background: var(--canvas); color: var(--ink); }
.copy-pending-badge {
  display: inline-block; font-size: 9px; font-family: var(--mono); font-weight: 700;
  background: var(--accent); color: #062018; padding: 2px 6px; border-radius: 4px;
  letter-spacing: .06em; text-transform: uppercase; margin-top: 6px;
}

/* Copy type badge */
.copy-card-type {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--accent-deep);
  margin-bottom: 4px;
}

/* Dropdown wraps */
.dropdown-wrap { position: relative; display: inline-block; }
.dropdown-menu {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  min-width: 160px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 4px;
  z-index: 200;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
}
.dd-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 7px 12px;
  font-size: 13px;
  color: var(--fg);
  border-radius: 5px;
  cursor: pointer;
}
.dd-item:hover { background: var(--hover); }
.dd-divider { height: 1px; background: var(--line); margin: 4px 0; }

/* Copy detail / editor pages */
.copy-detail-body, .copy-editor-body { max-width: 720px; padding: 0 0 48px; }
.copy-detail-field { margin-bottom: 24px; }
.copy-detail-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.copy-detail-value { font-size: 14px; line-height: 1.6; color: var(--fg); white-space: pre-wrap; }
.copy-detail-content { font-family: var(--mono); font-size: 13px; background: var(--canvas); padding: 12px; border-radius: 6px; }
.copy-editor-form { max-width: 720px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 48px; }
.btn-danger { padding: 7px 14px; border-radius: 8px; border: 1px solid #e05; color: #e05; background: none; cursor: pointer; font-size: 13px; }
.btn-danger:hover { background: rgba(238,0,85,.08); }

/* Folder checkbox */
.folder-checkbox {
  position: absolute;
  top: 8px;
  left: 8px;
  width: 16px;
  height: 16px;
  cursor: pointer;
  z-index: 10;
  accent-color: var(--accent);
}

/* Copy checkbox */
.copy-checkbox {
  position: absolute;
  top: 8px;
  left: 8px;
  width: 14px;
  height: 14px;
  cursor: pointer;
  z-index: 10;
  accent-color: var(--accent);
}
.copy-checkbox:disabled { opacity: 0.3; cursor: not-allowed; }
.copy-card.copy-selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }

/* Copy action bar */
.copy-action-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  margin-top: 8px;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 10px;
  font-size: 13px;
}
.copy-action-label { flex: 1; color: var(--fg); font-weight: 500; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--fg);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  z-index: 9999;
  pointer-events: none;
}
.toast.toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>

<nav id="topbar">
  <div class="brand"><b>Boxys</b><span>figma → html</span></div>
  <input id="topbar-search" type="search" placeholder="Buscar campanhas e criativos…">
  <div class="topbar-right">
    <div class="status-chip" id="cfg">
      <span class="dot off"></span><span id="cfgtext">Verificando…</span>
    </div>
    <button class="btn-primary" id="btn-new-campaign">+ Nova campanha</button>
  </div>
</nav>

<div id="layout">
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Navegação</div>
      <a class="sidebar-item" href="#/" id="sb-all">
        <span class="si-name">Todas as campanhas</span>
      </a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Campanhas</div>
      <div id="sb-campaigns"></div>
    </div>
  </aside>
  <main id="main"></main>
</div>

<!-- Context menu -->
<div id="ctx-menu" class="ctx-menu" style="display:none"></div>

<!-- Modal overlay -->
<div id="modal-overlay">
  <div id="modal-box"></div>
</div>

<script>
// ===== CONSTANTS =====
const STAGES = ["Figma","Normalizar","Exportar","Supabase","HTML"];

// ===== STATE =====
const state = {
  campaigns: [],
  currentCampaign: null,
  backendOk: true,
  selectedFrames: {},
  panelOpen: false,
  pendingCopyId: null,
  newCopyType: "criativo",
  selectedCampaigns: [],
  selectedCopies: [],
  selectionType: null,
};

// ===== UTILS =====
function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  return r.json();
}

function navigate(hash) { window.location.hash = hash; }

// ===== HEALTH =====
async function checkHealth() {
  try {
    const h = await api("GET", "/api/health");
    const all = h.figma_token && h.supabase_url && h.supabase_key;
    state.backendOk = true;
    document.querySelector("#cfg .dot").className = "dot " + (all ? "on" : "off");
    document.getElementById("cfgtext").innerHTML = all
      ? `bucket <b>${esc(h.bucket)}</b>` : "Faltam credenciais";
  } catch(e) {
    state.backendOk = false;
    document.getElementById("cfgtext").textContent = "Backend offline";
  }
}

// ===== CAMPAIGNS API =====
async function loadCampaigns() {
  try {
    const data = await api("GET", "/api/campaigns");
    state.campaigns = data.campaigns || [];
    renderSidebar();
  } catch(e) {}
}

async function loadCampaign(id) {
  const data = await api("GET", `/api/campaigns/${id}`);
  return data;
}

// ===== SIDEBAR =====
function renderSidebar() {
  const hash = window.location.hash || "#/";
  const container = document.getElementById("sb-campaigns");
  const allItem = document.getElementById("sb-all");
  allItem.className = "sidebar-item" + (hash === "#/" ? " active" : "");

  container.innerHTML = "";
  (state.campaigns || []).forEach(c => {
    const active = hash === `#/campaigns/${c.id}`;
    const item = el(`<a class="sidebar-item${active ? " active" : ""}" href="#/campaigns/${c.id}">
      <span class="si-name">${esc(c.name)}</span>
      <span class="si-count">${c.creative_count || 0}</span>
    </a>`);
    container.appendChild(item);
  });
}

// ===== ROUTER =====
function route() {
  const hash = window.location.hash || "#/";
  renderSidebar();

  // copy viewer: #/campaigns/5/copies/3
  const mCopyView = hash.match(/^#\/campaigns\/(\d+)\/copies\/(\d+)$/);
  if (mCopyView) { renderCopyViewer(parseInt(mCopyView[1]), parseInt(mCopyView[2])); return; }

  // copy editor (edit): #/campaigns/5/copies/3/edit
  const mCopyEdit = hash.match(/^#\/campaigns\/(\d+)\/copies\/(\d+)\/edit$/);
  if (mCopyEdit) { renderCopyEditor(parseInt(mCopyEdit[1]), parseInt(mCopyEdit[2])); return; }

  // copy editor (new): #/campaigns/5/copies/new
  const mCopyNew = hash.match(/^#\/campaigns\/(\d+)\/copies\/new$/);
  if (mCopyNew) { renderCopyEditor(parseInt(mCopyNew[1]), null); return; }

  if (hash === "#/") { renderHome(); return; }
  const m = hash.match(/^#\/campaigns\/(\d+)/);
  if (m) renderCampaign(parseInt(m[1]));
  else renderHome();
}

// ===== HOME VIEW =====
async function renderHome() {
  state.currentCampaign = null;
  document.title = "Boxys · Campanhas";
  const main = document.getElementById("main");

  main.innerHTML = `
    <div class="view-header">
      <div><h1>Campanhas<span class="count" id="camp-count"></span></h1></div>
      <div class="header-actions">
        <button class="btn-primary" onclick="showCreateCampaignModal()">+ Nova campanha</button>
      </div>
    </div>
    <div class="item-grid" id="home-grid">
      <div style="grid-column:1/-1;padding:32px;text-align:center;color:var(--muted)">Carregando…</div>
    </div>`;

  await loadCampaigns();
  const grid = document.getElementById("home-grid");
  if (!grid) return;

  const filtered = filterItems(state.campaigns, "name");
  document.getElementById("camp-count").textContent = ` · ${filtered.length}`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><b>Nenhuma campanha ainda</b><span>Clique em "Nova campanha" para começar.</span></div>`;
    return;
  }

  grid.innerHTML = "";
  filtered.forEach(c => grid.appendChild(makeFolderCard(c)));
}

function makeFolderCard(campaign) {
  const thumbs = campaign.preview_thumbs || [];
  const thumbsHtml = thumbs.slice(0,3).map(u =>
    `<img class="folder-thumb" src="${esc(u)}" alt="">`
  ).join("") || "";

  const card = el(`<div class="item-card" data-id="${campaign.id}">
    <input type="checkbox" class="folder-checkbox" data-id="${campaign.id}" ${state.selectedCampaigns.includes(campaign.id) ? "checked" : ""}>
    <div class="item-preview folder-preview">
      <svg class="folder-svg" viewBox="0 0 56 56" fill="none">
        <rect x="2" y="14" width="52" height="36" rx="5" fill="#0FA47F" opacity=".18"/>
        <path d="M2 20a5 5 0 0 1 5-5h14l4 5H49a5 5 0 0 1 5 5v16a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V20Z" fill="#0FA47F" opacity=".35"/>
        <path d="M2 22a5 5 0 0 1 5-5h14l4 5H49a5 5 0 0 1 5 5v14a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V22Z" fill="#0FA47F"/>
      </svg>
      <div class="folder-thumbs">${thumbsHtml}</div>
    </div>
    <div class="item-label">
      <div class="item-name">${esc(campaign.name)}</div>
      <div class="item-meta">${campaign.creative_count || 0} criativo${campaign.creative_count !== 1 ? "s" : ""}</div>
    </div>
    <button class="item-menu">⋯</button>
  </div>`);

  card.addEventListener("click", e => {
    if (e.target.classList.contains("item-menu")) return;
    if (e.target.classList.contains("folder-checkbox")) return;
    navigate(`#/campaigns/${campaign.id}`);
  });
  card.querySelector(".folder-checkbox").addEventListener("click", e => {
    e.stopPropagation();
    const id = campaign.id;
    if (state.selectedCampaigns.includes(id)) {
      state.selectedCampaigns = state.selectedCampaigns.filter(x => x !== id);
    } else {
      state.selectedCampaigns.push(id);
    }
    e.target.checked = state.selectedCampaigns.includes(id);
  });
  card.querySelector(".item-menu").addEventListener("click", e => {
    e.stopPropagation();
    showCtxMenu(e, [
      { label: "Renomear", action: () => renameCampaign(campaign) },
      { label: "Excluir", danger: true, action: () => deleteCampaign(campaign) },
    ]);
  });
  return card;
}

// ===== CAMPAIGN VIEW =====
async function renderCampaign(id) {
  document.title = "Boxys · Carregando…";
  const main = document.getElementById("main");
  main.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">Carregando campanha…</div>`;

  let data;
  try {
    data = await loadCampaign(id);
  } catch(e) {
    main.innerHTML = `<div style="padding:40px;color:var(--red)">Erro ao carregar campanha.</div>`;
    return;
  }

  if (data.status !== "ok") {
    navigate("#/"); return;
  }

  const { campaign, creatives, carousels, copies } = data;
  state.currentCampaign = { ...campaign, creatives, carousels, copies: copies || [] };
  state.pendingCopyId = null;
  document.title = `Boxys · ${campaign.name}`;
  state.selectedFrames = {};

  main.innerHTML = `
    <div class="breadcrumb">
      <a href="#/">Campanhas</a>
      <span class="sep">›</span>
      <span>${esc(campaign.name)}</span>
    </div>

    <div class="view-header">
      <div class="campaign-title-wrap">
        <span class="campaign-title" id="campaign-title" contenteditable="true"
          spellcheck="false">${esc(campaign.name)}</span>
      </div>
      <div class="header-actions">
        <div class="dropdown-wrap" id="dd-copy-wrap">
          <button class="btn-ghost" id="btn-new-copy">+ Copy ▾</button>
          <div class="dropdown-menu" id="dd-copy-menu" style="display:none">
            <button class="dd-item" data-copy-type="criativo">Criativo</button>
            <button class="dd-item" data-copy-type="landing_page">Landing page</button>
            <div class="dd-divider"></div>
            <button class="dd-item" id="dd-import-copies">↑ Importar copies</button>
          </div>
        </div>
        <div class="dropdown-wrap" id="dd-import-wrap">
          <button class="btn-ghost" id="btn-import-dd">↑ Importar ▾</button>
          <div class="dropdown-menu" id="dd-import-menu" style="display:none">
            <button class="dd-item" id="dd-import-figma">Figma</button>
            <button class="dd-item" id="dd-import-html">HTML</button>
            <button class="dd-item" id="dd-import-media">Mídia</button>
          </div>
        </div>
        <button class="btn-ghost" id="btn-new-carousel">⊞ Carrossel</button>
        <button class="btn-primary" id="btn-zip">↓ Exportar ZIP</button>
      </div>
    </div>

    <!-- Figma panel -->
    <div id="figma-panel" style="display:none">
      <div class="panel-header" id="panel-header">
        <h3>Adicionar do Figma</h3>
        <button class="panel-toggle" id="panel-toggle">▲</button>
      </div>
      <div class="panel-body" id="panel-body">
        <div class="panel-row">
          <div class="panel-field" style="flex:3">
            <label>File key ou URL do Figma</label>
            <input class="panel-input" id="p-filekey" placeholder="cole a URL ou a chave" spellcheck="false">
          </div>
          <div class="panel-field" style="flex:1">
            <label>Escala</label>
            <select class="panel-input" id="p-scale">
              <option value="1">1x</option>
              <option value="2" selected>2x</option>
              <option value="3">3x</option>
            </select>
          </div>
        </div>
        <div class="panel-field" id="p-copy-field" style="display:none">
          <label>Associar copy (preenche metatags)</label>
          <select class="panel-input" id="p-copy-select">
            <option value="">— sem copy —</option>
          </select>
        </div>
        <button class="panel-browse-btn" id="p-browse">Buscar frames →</button>

        <div class="frame-picker" id="p-picker" style="display:none">
          <div class="picker-head">
            <span id="p-picker-label">Frames</span>
            <button id="p-clear-sel" type="button">limpar seleção</button>
          </div>
          <div class="frame-grid" id="p-frame-grid"></div>
        </div>

        <button class="panel-run" id="p-run" style="display:none">Converter selecionados</button>
        <div class="conv-results-area" id="p-results"></div>
      </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="upload-input" multiple accept="image/*,video/*" style="display:none">
    <input type="file" id="html-import-input" accept=".html,text/html" style="display:none">

    <!-- Copies section -->
    <div class="copies-section" id="copies-section" style="display:none">
      <div class="copies-section-header">
        <span class="copies-section-title">Copies</span>
      </div>
      <div class="copies-row" id="copies-row"></div>
    </div>

    <!-- Content grid -->
    <div class="item-grid" id="campaign-grid"></div>
  `;

  // Wire up campaign title editing
  const titleEl = document.getElementById("campaign-title");
  titleEl.addEventListener("blur", async () => {
    const newName = titleEl.textContent.trim();
    if (newName && newName !== campaign.name) {
      await api("PUT", `/api/campaigns/${id}`, { name: newName });
      campaign.name = newName;
      document.title = `Boxys · ${newName}`;
      await loadCampaigns();
      renderSidebar();
    }
  });
  titleEl.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); titleEl.blur(); } });

  // Wire up buttons
  // Copy dropdown
  const ddCopyBtn = document.getElementById("btn-new-copy");
  const ddCopyMenu = document.getElementById("dd-copy-menu");
  ddCopyBtn.addEventListener("click", e => { e.stopPropagation(); ddCopyMenu.style.display = ddCopyMenu.style.display === "none" ? "block" : "none"; });
  ddCopyMenu.querySelectorAll("[data-copy-type]").forEach(btn => {
    btn.addEventListener("click", () => {
      ddCopyMenu.style.display = "none";
      state.newCopyType = btn.dataset.copyType;
      window.location.hash = `#/campaigns/${campaign.id}/copies/new`;
    });
  });
  document.getElementById("dd-import-copies").addEventListener("click", () => { ddCopyMenu.style.display = "none"; showImportCopiesModal(campaign.id); });

  // Import dropdown
  const ddImportBtn = document.getElementById("btn-import-dd");
  const ddImportMenu = document.getElementById("dd-import-menu");
  ddImportBtn.addEventListener("click", e => { e.stopPropagation(); ddImportMenu.style.display = ddImportMenu.style.display === "none" ? "block" : "none"; });
  document.getElementById("dd-import-figma").addEventListener("click", () => { ddImportMenu.style.display = "none"; toggleFigmaPanel(); });
  document.getElementById("dd-import-html").addEventListener("click", () => { ddImportMenu.style.display = "none"; document.getElementById("html-import-input").click(); });
  document.getElementById("dd-import-media").addEventListener("click", () => { ddImportMenu.style.display = "none"; document.getElementById("upload-input").click(); });

  // Close dropdowns on outside click
  document._ddCloseHandler && document.removeEventListener("click", document._ddCloseHandler);
  document._ddCloseHandler = () => { ddCopyMenu.style.display = "none"; ddImportMenu.style.display = "none"; };
  document.addEventListener("click", document._ddCloseHandler);

  document.getElementById("btn-new-carousel").addEventListener("click", () => showCreateCarouselModal(campaign.id));
  document.getElementById("btn-zip").addEventListener("click", () => showZipModal());
  document.getElementById("upload-input").addEventListener("change", e => handleUpload(e.target.files, campaign.id));
  document.getElementById("html-import-input").addEventListener("change", e => handleHtmlImportSelect(e.target.files[0], campaign.id));

  // Wire up Figma panel
  if (campaign.figma_file_key) {
    document.getElementById("p-filekey").value = campaign.figma_file_key;
  }
  document.getElementById("p-browse").addEventListener("click", panelBrowse);
  document.getElementById("p-clear-sel").addEventListener("click", panelClearSel);
  document.getElementById("p-run").addEventListener("click", panelConvert);

  renderCopiesRow(copies || []);
  renderCampaignGrid(creatives, carousels);
}

function renderCopiesRow(copies) {
  const section = document.getElementById("copies-section");
  const row = document.getElementById("copies-row");
  if (!section || !row) return;

  if (!copies.length) {
    section.style.display = "none";
    return;
  }
  section.style.display = "block";
  row.innerHTML = "";
  copies.forEach(cp => row.appendChild(makeCopyCard(cp)));
  updateCopyActionBar();
  refreshCopyPanelSelect();
}

function makeCopyCard(cp) {
  const isPending = state.pendingCopyId === cp.id;
  const isSelected = state.selectedCopies.some(c => c.id === cp.id);
  const isBlocked = state.selectionType !== null && !isSelected && (
    state.selectionType === "landing_page" ||
    cp.type === "landing_page" ||
    (state.selectionType === "criativo" && cp.type === "landing_page")
  );
  const typeLabel = cp.type === "landing_page" ? "Landing page" : "Criativo";
  const card = el(`<div class="copy-card${isPending ? " pending" : ""}${isSelected ? " copy-selected" : ""}" data-copy-id="${cp.id}">
    <input type="checkbox" class="copy-checkbox" ${isSelected ? "checked" : ""} ${isBlocked ? "disabled" : ""}>
    <div class="copy-card-type">${typeLabel}</div>
    <div class="copy-card-name">${esc(cp.name)}</div>
    ${cp.type !== "landing_page" && cp.title ? `<div class="copy-card-field"><b>T:</b> ${esc(cp.title)}</div>` : ""}
    ${cp.type !== "landing_page" && cp.description ? `<div class="copy-card-field"><b>D:</b> ${esc(cp.description)}</div>` : ""}
    ${cp.type !== "landing_page" && cp.message ? `<div class="copy-card-field"><b>M:</b> ${esc(cp.message)}</div>` : ""}
    <div class="copy-card-count">${cp.creative_count || 0} criativo${cp.creative_count !== 1 ? "s" : ""}</div>
    ${isPending ? `<div class="copy-pending-badge">Selecionada</div>` : ""}
    <button class="copy-card-menu">⋯</button>
  </div>`);

  card.addEventListener("click", e => {
    if (e.target.classList.contains("copy-card-menu")) return;
    if (e.target.classList.contains("copy-checkbox")) return;
    window.location.hash = `#/campaigns/${state.currentCampaign?.id}/copies/${cp.id}`;
  });

  card.querySelector(".copy-checkbox").addEventListener("click", e => {
    e.stopPropagation();
    if (!e.target.disabled) toggleCopySelection(cp);
    e.target.checked = state.selectedCopies.some(c => c.id === cp.id);
  });

  card.querySelector(".copy-card-menu").addEventListener("click", e => {
    e.stopPropagation();
    showCtxMenu(e, [
      { label: isPending ? "Desselecionar" : "Selecionar para conversão", action: () => setPendingCopy(isPending ? null : cp) },
      { label: "Editar", action: () => { window.location.hash = `#/campaigns/${state.currentCampaign?.id}/copies/${cp.id}/edit`; } },
      { label: "Excluir", danger: true, action: () => deleteCopy(cp) },
    ]);
  });
  return card;
}

function setPendingCopy(cp) {
  state.pendingCopyId = cp ? cp.id : null;
  // Re-render copy cards to reflect selection
  const copies = state.currentCampaign?.copies || [];
  renderCopiesRow(copies);
  refreshCopyPanelSelect();
}

function toggleCopySelection(cp) {
  const alreadySelected = state.selectedCopies.some(c => c.id === cp.id);

  if (alreadySelected) {
    state.selectedCopies = state.selectedCopies.filter(c => c.id !== cp.id);
    if (state.selectedCopies.length === 0) state.selectionType = null;
  } else {
    if (cp.type === "landing_page") {
      state.selectedCopies = [cp];
      state.selectionType = "landing_page";
    } else {
      if (state.selectionType === "landing_page") return;
      state.selectedCopies.push(cp);
      state.selectionType = "criativo";
    }
  }

  const copies = state.currentCampaign?.copies || [];
  renderCopiesRow(copies);
  updateCopyActionBar();
}

function updateCopyActionBar() {
  const existing = document.getElementById("copy-action-bar");
  if (existing) existing.remove();

  if (!state.selectedCopies.length) return;

  const section = document.getElementById("copies-section");
  if (!section) return;

  const count = state.selectedCopies.length;
  const typeLabel = state.selectionType === "landing_page" ? "landing page" : `criativo${count !== 1 ? "s" : ""}`;

  const allSameType = (state.currentCampaign?.copies || []).filter(c => c.type === state.selectionType);
  const allSelected = allSameType.length > 0 && allSameType.every(c => state.selectedCopies.some(s => s.id === c.id));
  const selectAllBtn = (state.selectionType === "criativo" && !allSelected)
    ? `<button class="btn-ghost" id="btn-select-all">Selecionar todos (${allSameType.length})</button>`
    : "";

  const bar = el(`<div id="copy-action-bar" class="copy-action-bar">
    <span class="copy-action-label">${count} ${typeLabel} selecionado${count !== 1 ? "s" : ""}</span>
    ${selectAllBtn}
    <button class="btn-ghost" id="btn-clear-selection">Limpar</button>
    <button class="btn-primary" id="btn-gerar-prompt">Gerar prompt →</button>
  </div>`);

  section.appendChild(bar);

  document.getElementById("btn-clear-selection").addEventListener("click", () => {
    state.selectedCopies = [];
    state.selectionType = null;
    renderCopiesRow(state.currentCampaign?.copies || []);
    updateCopyActionBar();
  });

  const selAllEl = document.getElementById("btn-select-all");
  if (selAllEl) selAllEl.addEventListener("click", () => {
    state.selectedCopies = [...allSameType];
    renderCopiesRow(state.currentCampaign?.copies || []);
    updateCopyActionBar();
  });

  document.getElementById("btn-gerar-prompt").addEventListener("click", () => gerarPrompt());
}

async function gerarPrompt() {
  const copies = state.selectedCopies;
  if (!copies.length) return;

  const type = state.selectionType;
  const promptType = type === "landing_page" ? "lp" : "criativo";

  const pdata = await api("GET", `/api/prompts/${promptType}`);
  if (pdata.status !== "ok") { alert("Erro ao carregar prompt: " + pdata.error); return; }

  const formattedCopies = copies.map(cp => {
    const contentMd = cp.content_html ? htmlToMarkdown(cp.content_html) : "";
    const contentPlain = cp.content || "";
    const contentFinal = contentMd && contentMd !== "" ? contentMd : contentPlain;

    let block = `ID: ${cp.name}`;
    if (contentFinal) block += `\nConteúdo:\n${contentFinal}`;
    return block;
  }).join("\n\n---\n\n");

  const output = pdata.prompt.replace("[COLAR AQUI O OUTPUT DO APP BOXYS]", formattedCopies);

  // Try modern API first, then legacy execCommand
  let copied = false;
  try {
    await navigator.clipboard.writeText(output);
    copied = true;
  } catch(_) {
    try {
      const ta = document.createElement("textarea");
      ta.value = output;
      ta.style.cssText = "position:fixed;top:-9999px;left:-9999px";
      document.body.appendChild(ta);
      ta.select();
      copied = document.execCommand("copy");
      document.body.removeChild(ta);
    } catch(_2) {}
  }
  if (copied) {
    showToast("Prompt copiado para a área de transferência!");
  } else {
    openModal(`
      <div class="modal-header">
        <h2>Prompt gerado</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <textarea class="form-input" style="min-height:300px;font-family:var(--mono);font-size:11px" readonly>${esc(output)}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="closeModal()">Fechar</button>
      </div>`, "modal-md");
  }
}

function htmlToMarkdown(html) {
  if (!html) return "";
  return html
    .replace(/<strong>([\s\S]*?)<\/strong>/gi, '**$1**')
    .replace(/<b>([\s\S]*?)<\/b>/gi, '**$1**')
    .replace(/<em>([\s\S]*?)<\/em>/gi, '*$1*')
    .replace(/<i>([\s\S]*?)<\/i>/gi, '*$1*')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/p>/gi, '\n')
    .replace(/<\/li>/gi, '\n')
    .replace(/<li>/gi, '• ')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&nbsp;/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function showToast(msg) {
  const existing = document.getElementById("toast");
  if (existing) existing.remove();
  const t = el(`<div id="toast" class="toast">${esc(msg)}</div>`);
  document.body.appendChild(t);
  setTimeout(() => t.classList.add("toast-show"), 10);
  setTimeout(() => { t.classList.remove("toast-show"); setTimeout(() => t.remove(), 300); }, 2500);
}

function refreshCopyPanelSelect() {
  const sel = document.getElementById("p-copy-select");
  const field = document.getElementById("p-copy-field");
  if (!sel) return;
  const copies = state.currentCampaign?.copies || [];
  sel.innerHTML = `<option value="">— sem copy —</option>` +
    copies.map(cp => `<option value="${cp.id}"${state.pendingCopyId === cp.id ? " selected" : ""}>${esc(cp.name)}</option>`).join("");
  if (field) field.style.display = copies.length ? "flex" : "none";
  sel.onchange = () => { state.pendingCopyId = sel.value ? +sel.value : null; };
}

function renderCampaignGrid(creatives, carousels) {
  const grid = document.getElementById("campaign-grid");
  if (!grid) return;
  grid.innerHTML = "";

  const allItems = [
    ...carousels.map(c => ({ ...c, _kind: "carousel" })),
    ...creatives.map(c => ({ ...c, _kind: "creative" })),
  ];

  if (!allItems.length) {
    grid.appendChild(el(`<div class="empty-state">
      <b>Nenhum criativo ainda</b>
      <span>Use "+ Figma" para converter frames ou "↑ Importar" para adicionar imagens.</span>
    </div>`));
    return;
  }

  allItems.forEach(item => {
    if (item._kind === "carousel") grid.appendChild(makeCarouselCard(item));
    else grid.appendChild(makeCreativeCard(item));
  });
}

function makeCreativeCard(creative) {
  const isDraft = creative.type === "html" && !creative.supabase_url;
  let previewHtml = "";
  if (creative.thumbnail_url) {
    previewHtml = `<img src="${esc(creative.thumbnail_url)}" alt="" loading="lazy">`;
  } else if (creative.type === "html") {
    previewHtml = `<div class="html-preview-bg">
      <span class="html-badge">&lt;/&gt; HTML</span>
      <span class="html-size">${esc(creative.format_label || `${creative.width}×${creative.height}`)}</span>
    </div>`;
  } else if (creative.type === "video") {
    previewHtml = `<div class="html-preview-bg" style="background:linear-gradient(135deg,#1B1E2E,#3A3F6A)">
      <span class="media-icon">▶</span>
      <span class="html-size">video</span>
    </div>`;
  } else {
    previewHtml = `<div class="html-preview-bg" style="background:linear-gradient(135deg,#2A2E44,#4A3F6A)">
      <span class="media-icon">🖼</span>
    </div>`;
  }

  const statusBadge = isDraft
    ? `<span class="draft-badge">Rascunho</span>`
    : (creative.type === "html" ? `<span class="published-badge">Publicado</span>` : "");

  const copies = state.currentCampaign?.copies || [];
  const linkedCopy = creative.copy_id ? copies.find(cp => cp.id === creative.copy_id) : null;
  const typeLabel = creative.type === "html"
    ? `HTML · ${esc(creative.format_label)}`
    : creative.type;

  const card = el(`<div class="item-card" data-id="${creative.id}" data-type="${esc(creative.type)}">
    <div class="item-preview">
      ${previewHtml}
      ${statusBadge}
    </div>
    <div class="item-label">
      <div class="item-name">${esc(creative.name)}</div>
      <div class="item-meta">${typeLabel}${linkedCopy ? ` · <span style="color:var(--accent-deep)">${esc(linkedCopy.name)}</span>` : ""}</div>
    </div>
    <button class="item-menu">⋯</button>
  </div>`);

  card.addEventListener("click", e => {
    if (e.target.classList.contains("item-menu")) return;
    showPreviewModal(creative);
  });

  const menuItems = [
    { label: "Pré-visualizar", action: () => showPreviewModal(creative) },

    menuItems.push({ label: "Baixar HTML", action: () => downloadCreativeHtml(creative) });
  }
  menuItems.push({ label: "Adicionar a carrossel", action: () => addToCarouselPrompt(creative) });
  menuItems.push({ label: "Associar copy", action: () => showAssociateCopyModal(creative) });
  menuItems.push({ label: "Excluir", danger: true, action: () => deleteCreative(creative) });

  card.querySelector(".item-menu").addEventListener("click", e => {
    e.stopPropagation();
    showCtxMenu(e, menuItems);

async function panelBrowse() {
  const fileKey = document.getElementById("p-filekey").value.trim();
  if (!fileKey) { alert("Cole o file key ou a URL do Figma primeiro."); return; }
  const btn = document.getElementById("p-browse");
  btn.disabled = true; btn.textContent = "Buscando…";
  const grid = document.getElementById("p-frame-grid");
  const picker = document.getElementById("p-picker");
  grid.innerHTML = `<div class="picker-loading">Carregando frames…</div>`;
  picker.style.display = "flex";
  picker.style.flexDirection = "column";

  try {
    const data = await api("POST", "/api/browse", { file_key: fileKey });
    if (data.status !== "ok") throw new Error(data.error || "Erro ao buscar frames");
    panelRenderFrameGrid(data.frames);
  } catch(e) {
    grid.innerHTML = `<div class="picker-loading" style="color:var(--red)">${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "Buscar frames →";

function panelRenderFrameGrid(frames) {
  const grid = document.getElementById("p-frame-grid");
  if (!frames.length) { grid.innerHTML = `<div class="picker-loading">Nenhum frame encontrado.</div>`; return; }
  grid.innerHTML = "";
  frames.forEach(f => {
    const card = document.createElement("div");
    card.className = "frame-card" + (state.selectedFrames[f.id] ? " selected" : "");
    card.dataset.id = f.id;
    card.innerHTML = `
      <div class="fcheck">✓</div>
      <div class="thumb-wrap">
        ${f.thumbnail_url
          ? `<img class="thumb" src="${esc(f.thumbnail_url)}" alt="" loading="lazy">`
          : `<div class="thumb-placeholder" style="aspect-ratio:${f.width}/${f.height}">${f.width}×${f.height}</div>`}
      </div>
      <div class="finfo">
        <div class="fname" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="fmeta">${esc(f.page)} · ${f.width}×${f.height}</div>
      </div>`;
    card.addEventListener("click", () => panelToggleFrame(f, card));
    grid.appendChild(card);
  });
  updatePanelPickerLabel();

  // Save file key to campaign if different
  if (state.currentCampaign) {
    const fk = document.getElementById("p-filekey").value.trim();
    if (fk && fk !== state.currentCampaign.figma_file_key) {
      api("PUT", `/api/campaigns/${state.currentCampaign.id}`, { figma_file_key: fk });
      state.currentCampaign.figma_file_key = fk;
    }
  }
}

function panelToggleFrame(f, card) {
  if (state.selectedFrames[f.id]) {
    delete state.selectedFrames[f.id];
    card.classList.remove("selected");
  } else {
    state.selectedFrames[f.id] = f;
    card.classList.add("selected");
  }
  updatePanelPickerLabel();
  const runBtn = document.getElementById("p-run");
  if (runBtn) runBtn.style.display = Object.keys(state.selectedFrames).length ? "block" : "none";
}

function panelClearSel() {
  state.selectedFrames = {};
  document.querySelectorAll("#p-frame-grid .frame-card.selected").forEach(c => c.classList.remove("selected"));
  updatePanelPickerLabel();
  const runBtn = document.getElementById("p-run");
  if (runBtn) runBtn.style.display = "none";
}

function updatePanelPickerLabel() {
  const n = Object.keys(state.selectedFrames).length;
  const lbl = document.getElementById("p-picker-label");
  if (lbl) lbl.textContent = n ? `${n} frame${n > 1 ? "s" : ""} selecionado${n > 1 ? "s" : ""}` : "Frames";

  if (runBtn) runBtn.style.display = n ? "block" : "none";

async function panelConvert() {
  const fileKey = document.getElementById("p-filekey").value.trim();
  const scale = +(document.getElementById("p-scale").value);
  const nodeIds = Object.keys(state.selectedFrames);
  if (!nodeIds.length) return;

  const btn = document.getElementById("p-run");
  btn.disabled = true; btn.textContent = "Convertendo…";

  const resultsArea = document.getElementById("p-results");
  resultsArea.innerHTML = "";

  const campaignId = state.currentCampaign?.id;
  const campaignName = state.currentCampaign?.name || "";

  // Create placeholder cards
  const cards = nodeIds.map(nid => {
    const info = state.selectedFrames[nid];
    const card = el(`<div class="conv-card" data-node-id="${esc(nid)}">
      <div class="conv-top"><span class="id">…</span><span class="fmt">—</span><span class="nid">${esc(info?.name || nid)}</span></div>
      ${pipeHTML()}
    </div>`);
    card.querySelectorAll(".step").forEach(s => s.className = "step active");
    resultsArea.appendChild(card);
    return { nid, card };
  });

  let results;
  try {
    const body = {
      file_key: fileKey, node_ids: nodeIds, scale,
      upload: false,                // preview only — Supabase happens on publish
      campaign: campaignName, campaign_id: campaignId || undefined,
      copy_id: state.pendingCopyId || undefined,
    };
    const data = await api("POST", "/api/convert_batch", body);
    if (data.status === "config_error") {
      results = nodeIds.map(() => ({ status: "config_error", error: data.error }));
    } else if (data.status !== "ok") {
      results = nodeIds.map(() => ({ status: "error", error: data.error || "Falha." }));
    } else {
      results = data.results;
    }
  } catch(e) {
    results = nodeIds.map(() => ({ status: "error", error: "Servidor não respondeu." }));
  }

  for (let i = 0; i < cards.length; i++) {
    const { card, nid } = cards[i];
    const res = results[i] || { status: "error", error: "Sem resultado" };
    if (res.creative_id) card.dataset.creativeId = res.creative_id;
    card.dataset.nodeId = nid;
    card.dataset.fileKey = fileKey;
    card.dataset.scale = scale;
    await finalizeConvCard(card, res, false);
  }

  btn.disabled = false; btn.textContent = "Converter selecionados";

  // Refresh campaign grid to show draft creatives
  if (campaignId) {
    const data = await loadCampaign(campaignId);
    if (data.status === "ok") {
      state.currentCampaign = { ...data.campaign, creatives: data.creatives, carousels: data.carousels, copies: data.copies || [] };
      renderCopiesRow(data.copies || []);
      renderCampaignGrid(data.creatives, data.carousels);
      await loadCampaigns();
      renderSidebar();
    }
  }
}

// pipeline HTML builder (same as original)
function pipeHTML() {
  let h = '<div class="pipe">';
  STAGES.forEach((s, i) => {
    h += `<div class="step" data-step="${i}"><div class="mark">${i+1}</div><div class="name">${s}</div></div>`;
    if (i < STAGES.length - 1) h += `<div class="link" data-link="${i}"></div>`;
  });
  return h + '</div>';
}

function setStage(card, idx, st) {
  const step = card.querySelector(`.step[data-step="${idx}"]`);
  if (step) step.className = "step " + st;
  if (st === "done") { const lk = card.querySelector(`.link[data-link="${idx}"]`); if (lk) lk.classList.add("done"); }
}

async function animatePipe(card, upTo, finalErr, skipIdx) {
  for (let i = 0; i <= upTo; i++) {
    if (i === skipIdx) {
      const step = card.querySelector(`.step[data-step="${i}"]`);
      if (step) { step.className = "step"; const mk = step.querySelector(".mark"); mk.style.borderStyle = "dashed"; mk.innerHTML = "–"; }
      const lk = card.querySelector(`.link[data-link="${i}"]`); if (lk) lk.classList.add("done");
      continue;
    }
    setStage(card, i, "active");
    await new Promise(r => setTimeout(r, 240));
    if (finalErr && i === upTo) { setStage(card, i, "err"); return; }
    setStage(card, i, "done");
  }
}

async function finalizeConvCard(card, res, upload) {
  const isErr = res.status !== "ok";
  card.querySelectorAll(".step").forEach(s => s.className = "step");
  card.querySelectorAll(".link").forEach(l => l.classList.remove("done"));
  card.querySelector(".id").textContent = res.template_id || (isErr ? "erro" : "—");
  card.querySelector(".fmt").textContent = res.format || "—";
  const skipIdx = (!isErr && !upload) ? 3 : -1;
  await animatePipe(card, isErr ? (res.status === "config_error" ? 0 : 3) : STAGES.length - 1, isErr, skipIdx);

  if (isErr) {
    card.appendChild(el(`<div class="err-box"><b>Erro.</b> <code>${esc(res.error || "")}</code></div>`));
  } else {
    const warns = (res.warnings || []);
    if (warns.length) card.appendChild(el(`<div class="warn-notice">${esc(warns.join(" "))}</div>`));

    if (!upload) {
      // Pre-fill from pending copy if available
      const copies = state.currentCampaign?.copies || [];
      const pendingCopy = copies.find(cp => cp.id === state.pendingCopyId);

      const form = el(`<div class="meta-form">
        <div class="meta-form-label">Metatags do anúncio${pendingCopy ? ` <span style="font-size:9px;background:var(--accent);color:#062018;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:700">copy: ${esc(pendingCopy.name)}</span>` : ""}</div>
        <input class="meta-title" placeholder="Título — ex: Apartamentos no Ibirapuera" spellcheck="false" value="${esc(pendingCopy?.title || "")}">
        <textarea class="meta-desc" placeholder="Descrição completa do anúncio" spellcheck="false">${esc(pendingCopy?.description || "")}</textarea>
        <input class="meta-message" placeholder="Mensagem / CTA — ex: Clique e saiba mais" spellcheck="false" value="${esc(pendingCopy?.message || "")}">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="publish-btn">↑ Publicar no Supabase</button>
          <a href="${esc(res.preview_url || "")}" target="_blank" style="font-size:12px;color:var(--accent-deep)">Preview →</a>
        </div>
      </div>`);
      form.querySelector(".publish-btn").addEventListener("click", () => publishFromCard(card, res));
      card.appendChild(form);
    } else {
      // Already uploaded
      card.appendChild(el(`<div class="published-bar">✓ Publicado no Supabase</div>`));
    }
  }
}

// ===== PUBLISH FROM CARD =====
async function publishFromCard(card, prevRes) {
  const fileKey = card.dataset.fileKey;
  const nid = card.dataset.nodeId;
  const scale = +(card.dataset.scale || 2);
  const creativeId = card.dataset.creativeId ? +card.dataset.creativeId : undefined;
  const campaignId = state.currentCampaign?.id;
  const campaignName = state.currentCampaign?.name || "";

  const title = card.querySelector(".meta-title")?.value?.trim() || "";
  const desc = card.querySelector(".meta-desc")?.value?.trim() || "";
  const message = card.querySelector(".meta-message")?.value?.trim() || "";

  const btn = card.querySelector(".publish-btn");
  btn.disabled = true; btn.textContent = "Publicando…";

  try {
    const body = {
      file_key: fileKey, node_ids: [nid], scale, upload: true,
      campaign: campaignName, campaign_id: campaignId || undefined,
      creative_ids: creativeId ? [creativeId] : [],
      title, desc, message,
      copy_id: state.pendingCopyId || undefined,
    };
    const data = await api("POST", "/api/convert_batch", body);
    if (data.status !== "ok" || !data.results?.[0] || data.results[0].status !== "ok") {
      const err = data.results?.[0]?.error || data.error || "Falha ao publicar.";
      btn.disabled = false; btn.textContent = "↑ Publicar no Supabase";
      alert(err);
      return;
    }
    // Replace meta form with published bar
    const form = card.querySelector(".meta-form");
    if (form) form.replaceWith(el(`<div class="published-bar">✓ Publicado no Supabase</div>`));

    // Refresh grid to show thumbnail
    if (campaignId) {
      const cdata = await loadCampaign(campaignId);
      if (cdata.status === "ok") {
        state.currentCampaign = { ...cdata.campaign, creatives: cdata.creatives, carousels: cdata.carousels, copies: cdata.copies || [] };
        renderCopiesRow(cdata.copies || []);
        renderCampaignGrid(cdata.creatives, cdata.carousels);
        await loadCampaigns(); renderSidebar();
      }
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = "↑ Publicar no Supabase";
    alert("Erro: " + e.message);
  }
}

// ===== FILE UPLOAD =====
async function handleUpload(files, campaignId) {
  if (!files || !files.length) return;
  for (const file of files) {
    const fd = new FormData();
    fd.append("file", file);
    try {
      await fetch(`/api/campaigns/${campaignId}/upload`, { method: "POST", body: fd });
    } catch(e) {}
  }
  // Refresh
  const data = await loadCampaign(campaignId);
  if (data.status === "ok") {
    state.currentCampaign = { ...data.campaign, creatives: data.creatives, carousels: data.carousels, copies: data.copies || [] };
    renderCopiesRow(data.copies || []);
    renderCampaignGrid(data.creatives, data.carousels);
    await loadCampaigns(); renderSidebar();
  }
}

// Preview modal
function previewStage(manifest) {
  const W = manifest.width, H = manifest.height, target = 340, scale = target / W;
  const stage = el(`<div class="stage" style="width:${W}px;height:${H}px;transform:scale(${scale})"></div>`);
  (manifest.backgrounds || []).forEach(bg => {
    const style = `left:${bg.x}px;top:${bg.y}px;width:${bg.width}px;height:${bg.height}px;`;
    if (bg.url) {
      stage.appendChild(el(`<img class="lyr" src="${esc(bg.url)}" style="${style}object-fit:cover" alt="">`));
    } else {
      stage.appendChild(el(`<div class="lyr" style="${style}background:linear-gradient(135deg,#1B1E2E,#0FA47F)"></div>`));
    }
  });
  (manifest.slots || []).forEach(s => {
    const st = `left:${s.x}px;top:${s.y}px;width:${s.width}px;height:${s.height}px;` +
      `font-family:'${s.font || "Space Grotesk"}',sans-serif;font-weight:${s.weight || 600};` +
      `font-size:${s.size || 32}px;color:${s.color || "#fff"};text-align:${s.align || "left"};` +
      `display:flex;flex-direction:column;justify-content:center;white-space:pre-wrap`;
    stage.appendChild(el(`<div class="lyr txt" contenteditable="true" style="${st}">${esc(s.default || "")}</div>`));
  });
  const wrap = el(`<div class="preview-stage-wrap"><div style="width:${W * scale}px;height:${H * scale}px"></div></div>`);
  wrap.querySelector("div").appendChild(stage);
  return wrap;
}

// ZIP export modal
let zipOrder = []; // array of creative objects in export order

function showZipModal(preselectedCarousel) {
  const campaign = state.currentCampaign;
  if (!campaign) return;

  const allCreatives = campaign.creatives || [];
  zipOrder = [];

  // If a carousel was passed, pre-select its items
  if (preselectedCarousel && preselectedCarousel.items) {
    zipOrder = preselectedCarousel.items.map(it => ({ ...it, id: it.id }));
  }

  openModal(buildZipModalHtml("carousel"), "modal-lg");
  renderZipSelectionGrid("carousel");
  renderZipOrderList();
  wireZipModal();
}

function buildZipModalHtml(format) {
  return `
    <div class="modal-header">
      <h2>Exportar ZIP</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>Formato</label>
        <div class="seg" id="zip-format-seg">
          <button class="${format === "carousel" ? "on" : ""}" data-fmt="carousel" onclick="switchZipFormat('carousel')">Carrossel</button>
          <button class="${format === "video" ? "on" : ""}" data-fmt="video" onclick="switchZipFormat('video')">Vídeo</button>
        </div>
      </div>
      <div id="zip-format-body"></div>
      <div class="form-field" style="margin-top:16px">
        <label>Título</label>
        <input class="form-input" id="zip-title" placeholder="Título do anúncio">
      </div>
      <div class="form-field">
        <label>Descrição</label>
        <textarea class="form-input" id="zip-desc" placeholder="Descrição completa"></textarea>
      </div>
      <div class="form-field">
        <label>Mensagem (CTA)</label>
        <input class="form-input" id="zip-message" placeholder="ex: Clique e saiba mais">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="btn-download-zip" onclick="downloadZip()">↓ Baixar ZIP</button>
    </div>`;
}

function switchZipFormat(fmt) {
  document.querySelectorAll("#zip-format-seg button").forEach(b => b.classList.toggle("on", b.dataset.fmt === fmt));
  renderZipSelectionGrid(fmt);
}

function getCurrentZipFormat() {
  return document.querySelector("#zip-format-seg button.on")?.dataset.fmt || "carousel";
}

function renderZipSelectionGrid(format) {
  const body = document.getElementById("zip-format-body");
  if (!body) return;
  const allCreatives = state.currentCampaign?.creatives || [];

  if (format === "carousel") {
    const items = allCreatives.map(c => {
      const isSelected = zipOrder.some(o => o.id === c.id);
      return `<div class="zip-item${isSelected ? " selected" : ""}" data-id="${c.id}" onclick="zipToggleCreative(${c.id})">
        <div class="zip-item-preview">
          ${c.thumbnail_url ? `<img src="${esc(c.thumbnail_url)}" alt="">` : `<div style="padding:8px;font-size:9px;color:var(--muted);text-align:center">${esc(c.format_label || c.type)}</div>`}
        </div>
        <div class="zip-item-name">${esc(c.name)}</div>
      </div>`;
    }).join("");

    body.innerHTML = `
      <div class="form-field">
        <label>Selecionar criativos</label>
        <div class="zip-select-grid">${items || `<div style="color:var(--muted);font-size:13px">Nenhum criativo na campanha.</div>`}</div>
      </div>
      <div class="form-field">
        <label>Variante</label>
        <select class="form-input" id="zip-variant">
          <option value="square">Square</option>
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
      </div>
      <div class="form-field" id="zip-order-section" style="display:${zipOrder.length ? "block" : "none"}">
        <label>Ordem de exportação (arraste para reordenar)</label>
        <div class="zip-order-list" id="zip-order-list"></div>
      </div>`;
    renderZipOrderList();
  } else {
    const videos = allCreatives.filter(c => c.type === "video");
    const images = allCreatives.filter(c => c.type === "image");
    const vOpts = videos.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
    body.innerHTML = `
      <div class="form-field">
        <label>Arquivo de vídeo</label>
        <select class="form-input" id="zip-video-id">${vOpts || `<option value="">— nenhum vídeo na campanha —</option>`}</select>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:-8px;padding:2px 0">
        A capa será extraída automaticamente do primeiro frame do vídeo.
      </div>`;
  }
}

function zipToggleCreative(cid) {
  const allCreatives = state.currentCampaign?.creatives || [];
  const creative = allCreatives.find(c => c.id === cid);
  if (!creative) return;
  const idx = zipOrder.findIndex(o => o.id === cid);
  if (idx > -1) {
    zipOrder.splice(idx, 1);
  } else {
    zipOrder.push(creative);
  }
  // Update selection indicator
  const item = document.querySelector(`.zip-item[data-id="${cid}"]`);
  if (item) item.classList.toggle("selected", zipOrder.some(o => o.id === cid));
  // Show/hide order section
  const section = document.getElementById("zip-order-section");
  if (section) section.style.display = zipOrder.length ? "block" : "none";
  renderZipOrderList();
}

function renderZipOrderList() {
  const list = document.getElementById("zip-order-list");
  if (!list) return;
  list.innerHTML = "";
  let dragSrcIdx = null;

  zipOrder.forEach((creative, idx) => {
    const item = el(`<div class="zip-order-item" draggable="true" data-idx="${idx}">
      <span class="drag-handle">⠿</span>
      ${creative.thumbnail_url ? `<img class="zip-order-thumb" src="${esc(creative.thumbnail_url)}" alt="">` : `<div class="zip-order-thumb"></div>`}
      <span class="zip-order-name">${esc(creative.name)}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${idx + 1}</span>
      <button class="zip-remove" onclick="zipRemoveIdx(${idx})">×</button>
    </div>`);

    item.addEventListener("dragstart", e => { dragSrcIdx = idx; item.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
    item.addEventListener("dragend", () => item.classList.remove("dragging"));
    item.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; item.classList.add("drag-over"); });
    item.addEventListener("dragleave", () => item.classList.remove("drag-over"));
    item.addEventListener("drop", e => {
      e.preventDefault(); item.classList.remove("drag-over");
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const moved = zipOrder.splice(dragSrcIdx, 1)[0];
      zipOrder.splice(idx, 0, moved);
      dragSrcIdx = null;
      renderZipOrderList();
    });

    list.appendChild(item);
  });
}

function zipRemoveIdx(idx) {
  const removed = zipOrder.splice(idx, 1)[0];
  if (removed) {
    const item = document.querySelector(`.zip-item[data-id="${removed.id}"]`);
    if (item) item.classList.remove("selected");
  }
  const section = document.getElementById("zip-order-section");
  if (section) section.style.display = zipOrder.length ? "block" : "none";
  renderZipOrderList();
}

async function downloadZip() {
  const format = getCurrentZipFormat();
  const title = document.getElementById("zip-title")?.value?.trim() || "";
  const description = document.getElementById("zip-desc")?.value?.trim() || "";
  const message = document.getElementById("zip-message")?.value?.trim() || "";

  const btn = document.getElementById("btn-download-zip");
  btn.disabled = true; btn.textContent = "Gerando…";

  let body;
  if (format === "carousel") {
    const variant = document.getElementById("zip-variant")?.value || "square";
    body = { format, title, description, message, carousel_variant: variant, creative_ids: zipOrder.map(c => c.id) };
  } else {
    const videoId = document.getElementById("zip-video-id")?.value;
    body = { format, title, description, message, video_creative_id: videoId ? +videoId : null };
  }

  try {
    const resp = await fetch("/api/export/zip", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error("Falha ao gerar ZIP");
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = (title || "export") + ".zip"; a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert("Erro ao gerar ZIP: " + e.message);
  }

  btn.disabled = false; btn.textContent = "↓ Baixar ZIP";
}

async function handleHtmlImportSelect(file, campaignId) {
  if (!file) return;
  const input = document.getElementById("html-import-input");
  if (input) input.value = "";

  // Parse the HTML first
  const fd = new FormData();
  fd.append("file", file);
  let parsed;
  try {
    const r = await fetch(`/api/campaigns/${campaignId}/parse-html`, { method: "POST", body: fd });
    parsed = await r.json();
    if (parsed.status !== "ok") throw new Error(parsed.error || "Erro ao ler o arquivo");
  } catch(e) {
    alert("Erro ao analisar o HTML: " + e.message);
    return;
  }

  const { meta, images, filename } = parsed;
  const total = images.length;
  const inSupabase = images.filter(i => i.in_supabase).length;
  const toUpload = total - inSupabase;

  const imgSummary = total === 0
    ? `<p style="font-size:12px;color:var(--muted)">Nenhuma imagem encontrada no HTML.</p>`
    : `<p style="font-size:12px;color:var(--muted)">
        ${total} imagem${total !== 1 ? "s" : ""} encontrada${total !== 1 ? "s" : ""} —
        ${inSupabase} já no Supabase${toUpload > 0 ? `, <b>${toUpload} será${toUpload !== 1 ? "ão" : ""} importada${toUpload !== 1 ? "s" : ""}</b>` : ""}.
       </p>`;

  openModal(`
    <div class="modal-header">
      <h2>Importar HTML</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px;font-family:var(--mono)">${esc(filename)}</p>
      <div class="form-field">

        <input class="form-input" id="ihtml-title" value="${esc(meta.title)}" placeholder="Título do anúncio">
      </div>
      <div class="form-field">
        <label>Descrição</label>
        <textarea class="form-input" id="ihtml-desc" placeholder="Descrição completa">${esc(meta.desc)}</textarea>
      </div>
      <div class="form-field">
        <label>Mensagem / CTA</label>
        <input class="form-input" id="ihtml-message" value="${esc(meta.message)}" placeholder="ex: Clique e saiba mais">
      </div>
      ${meta.format_label ? `<p style="font-size:12px;color:var(--muted)">Formato detectado: <b>${esc(meta.format_label)}</b></p>` : ""}
      <div style="margin-top:12px">${imgSummary}</div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="btn-confirm-html-import">↑ Importar e subir imagens</button>
    </div>`, "modal-md");

  document.getElementById("btn-confirm-html-import").addEventListener("click", () =>
    submitHtmlImport(file, campaignId)
  );
}

async function submitHtmlImport(file, campaignId) {
  const btn = document.getElementById("btn-confirm-html-import");
  btn.disabled = true; btn.textContent = "Importando…";

  const title   = document.getElementById("ihtml-title")?.value?.trim() || "";
  const desc    = document.getElementById("ihtml-desc")?.value?.trim() || "";
  const message = document.getElementById("ihtml-message")?.value?.trim() || "";

  const fd = new FormData();
  fd.append("file", file);
  fd.append("title", title);
  fd.append("desc", desc);
  fd.append("message", message);
  fd.append("upload", "true");

  try {
    const r = await fetch(`/api/campaigns/${campaignId}/import-html`, { method: "POST", body: fd });
    const data = await r.json();
    if (data.status !== "ok") throw new Error(data.error || "Falha ao importar");
    closeModal();
    const cdata = await loadCampaign(campaignId);
    if (cdata.status === "ok") {
      state.currentCampaign = { ...cdata.campaign, creatives: cdata.creatives, carousels: cdata.carousels };
      renderCampaignGrid(cdata.creatives, cdata.carousels);
      await loadCampaigns(); renderSidebar();
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = "↑ Importar e subir imagens";
    alert("Erro: " + e.message);
  }
}

// ===== SEARCH =====
document.getElementById("topbar-search").addEventListener("input", () => {
  const hash = window.location.hash || "#/";
  if (hash === "#/") renderHome();
});

// ===== NEW CAMPAIGN BUTTON IN TOPBAR =====
document.getElementById("btn-new-campaign").addEventListener("click", showCreateCampaignModal);

// ===== INIT =====
window.addEventListener("hashchange", route);
window.addEventListener("load", () => {
  checkHealth();
  loadCampaigns().then(route);
});
</script>
